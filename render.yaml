# Free-tier Blueprint: one web service (API + embedded Redis + worker).
# Set GROQ_API_KEY, DATABASE_URL, DATABASE_URL_SYNC in the Render dashboard.
services:
  - type: web
    name: ollive-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: EMBED_WORKER
        value: "true"
      - key: EMBED_REDIS
        value: "true"
      - key: DEFAULT_PROVIDER
        value: groq
      - key: DEFAULT_MODEL
        value: openai/gpt-oss-20b
      - key: PII_REDACTION_ENABLED
        value: "true"
      - key: CONTEXT_WINDOW_MESSAGES
        value: "12"
      - key: INGESTION_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
