services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive
      POSTGRES_DB: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollive -d ollive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ollive:ollive@postgres:5432/ollive
      DATABASE_URL_SYNC: postgresql://ollive:ollive@postgres:5432/ollive
      REDIS_URL: redis://redis:6379/0
      INGESTION_URL: http://api:8000/v1/ingest
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL_SYNC: postgresql://ollive:ollive@postgres:5432/ollive
      REDIS_URL: redis://redis:6379/0
      WORKER_NAME: ${HOSTNAME:-worker-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    environment:
      PORT: "80"
      API_UPSTREAM: http://api:8000
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data: